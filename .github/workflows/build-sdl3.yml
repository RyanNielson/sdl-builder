name: Build SDL3 Libs

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  SDL_VERSION: release-3.4.4
  SDL_IMAGE_VERSION: release-3.4.2

jobs:
  Build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: osx
            sdl_lib: libSDL3.dylib
            sdl_image_lib: libSDL3_image.dylib
    runs-on: ${{matrix.os}}
    steps:
      - name: Clone SDL3
        run: git clone --depth 1 --branch ${{env.SDL_VERSION}} https://github.com/libsdl-org/sdl sdl
      - name: Clone SDL_image
        run: git clone --depth 1 --branch ${{env.SDL_IMAGE_VERSION}} --recurse-submodules https://github.com/libsdl-org/SDL_image sdl-image
      - name: Setup macOS universal build
        if: ${{ runner.os == 'macOS' }}
        run: echo "CMAKE_EXTRA_ARGS=-DCMAKE_OSX_ARCHITECTURES=arm64" >> $GITHUB_ENV
      - name: Build SDL3
        shell: bash
        run: |
          cmake -B build -S sdl \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_TEST_LIBRARY=OFF \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF \
            $CMAKE_EXTRA_ARGS
          cmake --build build --config Release
          cmake --install build --prefix ${{github.workspace}}/sdl3-install
      - name: Build SDL_image
        shell: bash
        run: |
          cmake -B build-image -S sdl-image \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL3_DIR=${{github.workspace}}/sdl3-install/lib/cmake/SDL3 \
            -DSDLIMAGE_VENDORED=ON \
            -DSDLIMAGE_DEPS_SHARED=OFF \
            -DSDLIMAGE_TESTS=OFF \
            -DSDLIMAGE_AVIF=OFF \
            $CMAKE_EXTRA_ARGS
          cmake --build build-image --config Release
          cmake --install build-image --prefix ${{github.workspace}}/sdl-image-install
      - name: Collect Artifacts
        shell: bash
        run: | 
          mkdir -p out
          cp ${{github.workspace}}/sdl3-install/lib/${{matrix.sdl_lib}} out/
          cp ${{github.workspace}}/sdl-image-install/lib/${{matrix.sdl_image_lib}} out/
      - name: Fix macOS dylib paths
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          # Fix SDL3's install name
          install_name_tool -id @loader_path/${{matrix.sdl_lib}} out/${{matrix.sdl_lib}}

          # Fix SDL_image's install name
          install_name_tool -id @loader_path/${{matrix.sdl_image_lib}} out/${{matrix.sdl_image_lib}}

          # Fix SDL_image's reference to SDL3
          OLD_SDL_PATH=$(otool -L out/${{matrix.sdl_image_lib}} | grep libSDL3.0 | head -1 | awk '{print $1}')
          install_name_tool -change "$OLD_SDL_PATH" @loader_path/${{matrix.sdl_lib}} out/${{matrix.sdl_image_lib}}
      - name: Publish Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{matrix.target}}
          path: out/
  UpdateLibs:
    if: github.ref == 'refs/heads/main'
    needs: [Build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download libs
        uses: actions/download-artifact@v4
        with:
          path: libs
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Updated sdl and sdl_image libs"
          git push
