name: Build Game

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  Build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
    runs-on: ${{matrix.os}}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Publish
        run: dotnet publish -r ${{matrix.rid}} -c Release --self-contained -p:PublishSingleFile=true -p:DebugType=none Examples/Memory
      - name: Publish Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Memory-${{matrix.rid}}
          path: Examples/Memory/bin/Release/net10.0/${{matrix.rid}}/publish/
